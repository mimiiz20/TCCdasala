<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Login</title>
    <link rel="stylesheet" href ="static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="icon" href="{{ url_for('static', filename='janela_icone.png') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body id="login-body">
    <div id="login-page">
        <div id="login-img">
            <img src="static/industria.png" alt="login-img">
        </div>
        <div id="login-form">
            <div id="titulo-login">
                <h2>BOAS-VINDAS AO</h2>
                <h1>SENAI ALMOXARIFADO</h1>
            </div>
            <div id="login-card">
                <div id="fiep-img">
                    <img src="static/fiep.png" alt="fiep-img">
                </div>
                <form action="/login" method="POST">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="text" class="form-control" id="usuario" name="email" placeholder="seunome@empresa.com">
                </div>
                <div class="mb-3">
                    <label>Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha">
                </div>
                <div>
                    <button id="btn-entrar" type="submit" class="btn btn-primary">Entrar</button>
                </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
