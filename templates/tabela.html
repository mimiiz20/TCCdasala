<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='janela_icone.png') }}">
    <title>SENAI - Início</title>
</head>
<body>
    
    <div id="topbar">
        <span class="material-symbols-outlined icon-menu">menu</span>
        <div id="logo">
            <img src="/static/logo_sistema.png">
        </div>
    
        <div class="menu-topbar">
            <a href="/tabela" class="menu-item">HOME</a>
            <a href="/editar" class="menu-item">EDITAR</a>
        </div>
    
        <div id="perfil">
            <img src="/static/logo_perfil.png">
        </div>
    </div>
    
    <h1 id="titulo">Bem-vindo(a) ao Almoxarifado!</h1>


    <div class="table-container">
    <table class="table table-bordered tabela-estoque">
        <tr>
            <th>ID</th>
            <th>RESPONSÁVEL</th>
            <th>NOME</th>
            <th>QUANTIDADE</th>
            <th>IMAGEM</th>
            <th>EXCLUIR</th>
        </tr>

        {% for item in resultado %}

        <tr>
            <td>{{item[0]}}</td>
            <td>{{item[1]}}</td>
            <td>{{item[2]}}</td>
            <td>{{item[3]}}</td>

            <td>
                <button class="btn btn-primary btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#modal{{item[0]}}">
                    <span class="material-symbols-outlined">photo_camera</span>
                </button>
            </td>

            <td>
                <button class="btn btn-danger btn-sm"
                    onclick="excluirItem('{{ item[0] }}')">
                    Excluir
                </button>
            </td>
        </tr>

        {% endfor %}
    </table>
</div>

{% for item in resultado %}
<div class="modal fade" id="modal{{item[0]}}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">{{item[2]}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="{{item[4]}}" class="img-fluid" style="max-height:400px;">
            </div>

        </div>
    </div>
</div>

{% endfor %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
